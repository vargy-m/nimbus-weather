<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Weather app"/>
    <title>Nimbus</title>
    <link rel="stylesheet" href="styles.css"/>
    <link rel="icon" type="image/png" href=" https://cdn-icons-png.flaticon.com/512/678/678310.png"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body>
    <video autoplay muted loop playsinline id="background-video">
        <source src="videos/background.mp4" type="video/mp4">
    </video>

<header><h1>Nimbus <em>Weather</em></h1></header>

    <main class="main-container">
        <section id="landing-page">
            <div id="landing-page-text">
            <h1>Know before you go.</h1>
            <p>"Move fast and bring an umbrella."</p>
            </div>
             <form id="city-search-form-landing" class="city-search-form-landing">
                <div class="search-container-landing">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="search-bar-landing" type="search" class="search-bar-landing" placeholder="Search city..." autocomplete="off"/>
                    <button id="location-btn-landing"><i class="fa-solid fa-location-crosshairs"></i></button>
                    <button class="search-button">Search</button>
                </div>
                <p id="error-message-landing"></p>
            </form>
            <div id="popular-cities">
                <button class="city-btn">New York</button>
                <button class="city-btn">London</button>
                <button class="city-btn">San Diego</button>
                <button class="city-btn">Tokyo</button>
            </div>
        </section>

    <div class="weather-content">

        <form id="city-search-form-weather" class="city-search-form-weather">
            <div class="search-container-weather">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input id="search-bar-weather" type="search" class="search-bar-weather" placeholder="Search city..." autocomplete="off"/>
                <button id="location-btn-weather"><i class="fa-solid fa-location-crosshairs"></i></button>
                <button class="search-button">Search</button>
            </div>
            <p id="error-message-weather"></p>
            </form>
            
        <section id="weather-screen">

            <p id="current-location">&#8599; Current Location</p> 
            <p id="city-name"></p>
            <p id="temp-number"></p>
            <p id="weather-description"></p>
            <p id="feels-like">
                <span class="label">Feels like: </span>
                <span id="feels-like-value"></span>
            </p>
            <div id="high-low">
                <p><span class="label">H: </span><span id="high"></span></p>
                <p><span class="label">L: </span><span id="low"></span></p>
            </div>
        </section>

        <section id="hourly-weather">

        </section>

        <section id="weekly-forecast">
            
        </section>
    </div>

    </main>

<script src="script.js"></script>
</body>    
</html>
